<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Micaela 💖</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #fff;
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.2);
      padding: 35px;
      border-radius: 25px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 320px;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      margin: 8px 0;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #ff6f91;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff3e6c;
      transform: scale(1.08);
    }

    .heart {
      font-size: 2.5rem;
      animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .floating {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp 6s linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="heart">💖</div>
    <h1>Hi Micaela 😊</h1>
    <p>Just a tiny reminder...</p>
    <p>You're cute, funny, and kind of amazing 😌</p>
    <p>(Okay… not kind of… REALLY amazing)</p>

    <button onclick="showMessage()">Click for a secret 💌</button>
    <p id="secret" style="margin-top:15px;"></p>

    <button onclick="joke()">Or click for a joke 😂</button>
    <p id="jokeText"></p>
  </div>

  <script>
    function showMessage() {
      document.getElementById("secret").innerHTML = "I hope this made you smile even just a little 💕";
    }

    function joke() {
      document.getElementById("jokeText").innerHTML = "Are you WiFi? Because I'm feeling a strong connection 😏";
    }

    // floating hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("floating");
      heart.innerHTML = "💗";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 500);
  </script>

</body>
</html>
